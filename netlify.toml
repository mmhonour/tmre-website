[build]
  # Full MLS → SQLite rebuild (+ Goldilocks scores) on every Netlify deploy into
  # the bundled DB artifact; requires RETS_* env vars in Netlify.
  # Runtime: incremental every 30 min (sync-listings) + full reload daily at 5am ET
  # (sync-listings-full). Local next:dev also full-rebuilds on process start via instrumentation.
  command = "LISTINGS_DB_PATH=data/listings.bundle.db npm run sync:listings && npm run build"

[build.environment]
  NODE_VERSION = "20"
  LISTINGS_DB_PATH = "/tmp/listings.db"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["rets-client", "node-expat", "better-sqlite3", "bindings"]
  included_files = [
    "node_modules/rets-client/**",
    "node_modules/node-expat/**",
    "node_modules/better-sqlite3/**",
    "node_modules/bindings/**",
    "data/listings.bundle.db",
  ]
