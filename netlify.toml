[build]
  # Do not run MLS sync during deploy builds — bundled listings.bundle.db is shipped
  # via included_files; runtime refresh uses Netlify scheduled functions.
  # Set SKIP_LISTINGS_SYNC=0 in Netlify UI to force build-time sync (local dev: npm run sync:listings).
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  SKIP_LISTINGS_SYNC = "true"
  LISTINGS_DB_PATH = "/tmp/listings.db"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  timeout = 900
  external_node_modules = ["rets-client", "node-expat", "better-sqlite3", "bindings"]
  included_files = [
    "node_modules/rets-client/**",
    "node_modules/node-expat/**",
    "node_modules/better-sqlite3/**",
    "node_modules/bindings/**",
    "data/listings.bundle.db",
  ]
