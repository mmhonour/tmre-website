[build]
  # Prepare bundled SQLite artifact, rebuild native bindings for Lambda, then build.
  # Runtime sync uses Netlify scheduled functions; bundle seeds /tmp on cold starts.
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "22"
  SKIP_LISTINGS_SYNC = "true"
  LISTINGS_DB_PATH = "/tmp/listings.db"
  # Force native addons to compile for Node 22 on CI (avoid stale Node 20 prebuilds).
  NPM_CONFIG_BUILD_FROM_SOURCE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["rets-client", "node-expat", "better-sqlite3", "bindings"]
  included_files = [
    "node_modules/rets-client/**",
    "node_modules/node-expat/**",
    "node_modules/better-sqlite3/**",
    "node_modules/bindings/**",
    "data/listings.bundle.db",
  ]
