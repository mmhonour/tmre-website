[build]
  # Prepare bundled SQLite artifact, rebuild native bindings for Lambda, then build.
  # Runtime sync uses Netlify scheduled functions; bundle seeds /tmp on cold starts.
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "22"
  SKIP_LISTINGS_SYNC = "true"
  LISTINGS_DB_PATH = "/tmp/listings.db"
  # Prevent npm install / rebuild from compiling native addons on Noble (glibc 2.38).
  NPM_CONFIG_BUILD_FROM_SOURCE = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["rets-client", "node-expat", "better-sqlite3", "bindings", "@netlify/blobs"]
  included_files = [
    "node_modules/rets-client/**",
    "node_modules/node-expat/**",
    "node_modules/better-sqlite3/**",
    "node_modules/bindings/**",
  ]

# Bundle only on scheduled sync handlers — not global (avoids duplicate copy in Next server handler).
[functions."sync-listings"]
  included_files = ["data/listings.bundle.db"]

[functions."sync-listings-full"]
  included_files = ["data/listings.bundle.db"]

[functions."sync-property-addresses"]
  included_files = ["data/listings.bundle.db"]

[functions."sync-listing-edge-scores"]
  included_files = ["data/listings.bundle.db"]
